<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodePro Interactive Sprint</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">

    <style>
        .hero-section {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
        }
        .feature-icon {
            font-size: 2.5rem;
            color: #3b82f6;
        }
        .hover-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .hover-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15) !important;
        }
        body.dark-theme {
            background-color: #121212;
            color: #e0e0e0;
        }
        body.dark-theme .bg-light {
            background-color: #1e1e1e !important;
            color: #e0e0e0;
        }
        body.dark-theme .card {
            background-color: #2d2d2d;
            color: #ffffff;
            border: 1px solid #444;
        }
        body.dark-theme .text-muted {
            color: #b0b0b0 !important;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">CodePro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#hero">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#features">Why Learn With Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="#team">Our Team</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                    <li class="nav-item ms-lg-3 me-2 my-2 my-lg-0">
                        <button id="themeToggle" class="btn btn-outline-info btn-sm">
                            <i class="bi bi-moon-fill"></i> Dark Mode
                        </button>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-primary btn-sm px-3" href="#contact">Enroll Now</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

                </div>
            </div>
        </div>
    </header>
