<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Card Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container my-5">
        <section class="hero text-center mb-5">
            <p class="eyebrow">Campus Directory</p>
            <h1>User Profiles</h1>
            <h3 id="user-count-heading" class="mt-3 text-muted">Loading users...</h3>
        </section>

        <div id="user-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"></div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <script>
        $(document).ready(function() {
            const apiURL = "https://jsonplaceholder.typicode.com/users";

            $.getJSON(apiURL, function(data) {
                $("#user-count-heading").text(`Showing ${data.length} users`);

                data.forEach((user, index) => {
                    const bgClass = (index % 2 === 0) ? "teal-accent" : "";

                    const cardHTML = `
                        <div class="col">
                            <div class="card h-100 shadow-sm ${bgClass}">
                                <div class="card-img-container text-center p-3">
                                    <img src="https://i.pravatar.cc/150?img=${user.id}" class="rounded-circle profile-img" alt="Portrait of ${user.name}">
                                </div>
                                <div class="card-body d-flex flex-column text-center">
                                    <h5 class="card-title fw-bold">${user.name}</h5>
                                    <p class="card-text text-muted mb-1">
                                        <strong>✉️ Email:</strong> ${user.email}
                                    </p>
                                    <p class="card-text text-muted">
                                        <strong>🏢 Company:</strong> ${user.company.name}
                                    </p>
                                </div>
                            </div>
                        </div>
                    `;

                    $("#user-container").append(cardHTML);
                });
            }).fail(function() {
                $("#user-count-heading").text("Failed to load users.");
            });
        });
    </script>
</body>
</html>
